version: "3.5"

services:
  api01: &api
    image: orogerio/person-db
    env_file:
      - .env
    environment:
      POSTGRES__HOST: ${POSTGRES__HOST}
      POSTGRES__PORT: ${POSTGRES__PORT}
      POSTGRES__DB_NAME: ${POSTGRES__DB_NAME}
      POSTGRES__USER: ${POSTGRES__USER}
      POSTGRES__PASSWORD: ${POSTGRES__PASSWORD}
      POSTGRES__POOL_SIZE: ${POSTGRES__POOL_SIZE}
      POSTGRES__ACQUIRE_TIMEOUT: ${POSTGRES__ACQUIRE_TIMEOUT}
      POSTGRES__IDLE_TIMEOUT: ${POSTGRES__IDLE_TIMEOUT}
      REDIS__HOST: ${REDIS__HOST}
      REDIS__PORT: ${REDIS__PORT}
      RABBIT__HOST: ${RABBIT__HOST}
      RABBIT__PORT: ${RABBIT__PORT}
      RABBIT__USER: ${RABBIT__USER}
      RABBIT__PASSWORD: ${RABBIT__PASSWORD}
      RABBIT__QUEUE_NAME: ${RABBIT__QUEUE_NAME}
      SERVER__HOST: ${SERVER__HOST}
      SERVER__PORT: 8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "0.4GB"
    network_mode: host
    extra_hosts:
      - "db:127.0.0.1"
      - "redis:127.0.0.1"
      - "rabbitmq:127.0.0.1"

  api02:
    <<: *api
    env_file:
      - .env
    environment:
      SERVER__PORT: 8081

  nginx: # Load Balancer
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "0.5GB"
    network_mode: host
    extra_hosts:
      - "api01:127.0.0.1"
      - "api02:127.0.0.1"

  db: # Banco de dados
    image: postgres
    env_file:
      - .env
    hostname: db
    environment:
      POSTGRES_USER: ${POSTGRES__USER}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD}
      POSTGRES_DB: ${POSTGRES__DB_NAME}
    volumes:
      - ./db-init.sql:/docker-entrypoint-initdb.d/db-init.sql
      - ./postgresql.conf:/docker-entrypoint-initdb.d/postgresql.conf
    command: postgres -c config_file=/docker-entrypoint-initdb.d/postgresql.conf
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.9"
          memory: "1.4GB"

  redis:
    image: redis
    hostname: redis
    command: redis-server --save "" --appendonly no --maxclients 20000
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "0.3GB"
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 30s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    env_file:
      - .env
    hostname: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 30s
      retries: 5
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT__USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT__PASSWORD}
      RABBITMQ_INIT_DB: true
    volumes:
      - rabbitmq:/var/lib/rabbitmq
      - ./definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq.conf:/etc/rabbitmq/conf.d/99-config.conf
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "0.3GB"
    network_mode: host

volumes:
  rabbitmq:

